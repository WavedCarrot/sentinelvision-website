<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1120">
  <title>Payment Successful &mdash; SentinelVision Pro</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .success-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .success-icon {
      font-size: 4rem;
      color: #22c55e;
      margin-bottom: 1rem;
    }
    .success-title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    .success-sub {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
      max-width: 520px;
    }
    .key-box {
      background: var(--card-bg, #111827);
      border: 1px solid var(--border, #1e293b);
      border-radius: 12px;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
      margin: 0 auto 2rem;
      text-align: left;
    }
    .key-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .key-value {
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: #3b82f6;
      word-break: break-all;
      background: rgba(59,130,246,0.08);
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      border: 1px solid rgba(59,130,246,0.2);
    }
    .copy-hint {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .key-meta {
      margin-top: 1.2rem;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .loading-state {
      color: var(--muted);
      font-size: 1rem;
      margin: 2rem 0;
    }
    .error-state {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 1.5rem;
      max-width: 520px;
      color: #f87171;
      margin: 1rem auto 2rem;
    }
    .btn-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container nav-inner">
    <a href="/" class="brand">
      <img src="/img/logo.svg" alt="SentinelVision Pro" class="brand-logo">
      <div class="brand-text">
        <strong>SentinelVision <em class="brand-pro">Pro</em></strong><span class="brand-sub">Security Platform</span>
      </div>
    </a>
  </div>
</nav>

<div class="success-wrap">

  <div class="success-icon" id="status-icon">
    <i class="fas fa-circle-notch fa-spin"></i>
  </div>

  <h1 class="success-title" id="status-title">Confirming your payment&hellip;</h1>
  <p class="success-sub" id="status-sub">Please wait while we verify your payment and generate your license key.</p>

  <div id="key-section" style="display:none; width:100%; max-width:560px;">
    <div class="key-box" id="key-box">
      <!-- populated by JS -->
    </div>
    <div class="btn-row">
      <a href="/docs/" class="btn btn-secondary"><i class="fas fa-book"></i> Activation Guide</a>
      <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
    </div>
  </div>

  <div id="error-section" style="display:none;">
    <div class="error-state" id="error-box"></div>
    <div class="btn-row">
      <a href="mailto:info@sentinelvision.net.za" class="btn btn-primary"><i class="fas fa-envelope"></i> Contact Support</a>
      <a href="/order/" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Order</a>
    </div>
  </div>

</div>

<script>
(function () {
  const BACKEND = 'https://tribunal-carbon-atlantic.ngrok-free.dev';
  const checkoutId = localStorage.getItem('sv_checkout_id');

  const icon      = document.getElementById('status-icon');
  const title     = document.getElementById('status-title');
  const sub       = document.getElementById('status-sub');
  const keySection   = document.getElementById('key-section');
  const errorSection = document.getElementById('error-section');
  const keyBox    = document.getElementById('key-box');
  const errorBox  = document.getElementById('error-box');

  function showSuccess(data) {
    icon.innerHTML  = '<i class="fas fa-check-circle" style="color:#22c55e"></i>';
    title.textContent = 'Payment Successful!';
    sub.textContent   = 'Your license key has been generated and emailed to you. Copy it below and activate in SentinelVision.';

    const keys = data.all_keys && data.all_keys.length ? data.all_keys : [data.license_key];
    let html = '';
    keys.forEach(function(k, i) {
      if (!k) return;
      html += '<div class="key-label">' + (keys.length > 1 ? 'License Key ' + (i+1) : 'License Key') + ' <span style="font-size:.7rem">(click to copy)</span></div>';
      html += '<div class="key-value" onclick="copyKey(this)">' + k + '</div>';
    });
    html += '<div class="copy-hint"><i class="fas fa-clipboard" style="margin-right:.3rem"></i>Click the key to copy it to your clipboard.</div>';
    html += '<div class="key-meta">';
    if (data.feature_name)   html += '<strong>Feature:</strong> ' + data.feature_name + '<br>';
    if (data.duration_label) html += '<strong>Duration:</strong> ' + data.duration_label + '<br>';
    if (data.device_serial)  html += '<strong>Device Serial:</strong> <code>' + data.device_serial + '</code><br>';
    if (data.order_id)       html += '<strong>Order Ref:</strong> ' + data.order_id + '<br>';
    html += '<br><i class="fas fa-envelope" style="color:#3b82f6;margin-right:.3rem"></i>A copy of your key has been sent to your email address.';
    html += '</div>';
    keyBox.innerHTML = html;
    keySection.style.display = '';
    localStorage.removeItem('sv_checkout_id');
  }

  function showError(msg) {
    icon.innerHTML   = '<i class="fas fa-exclamation-circle" style="color:#f87171"></i>';
    title.textContent = 'Something went wrong';
    sub.textContent   = '';
    errorBox.innerHTML = '<i class="fas fa-exclamation-circle" style="margin-right:.5rem"></i>' + msg;
    errorSection.style.display = '';
  }

  window.copyKey = function(el) {
    navigator.clipboard.writeText(el.textContent.trim()).then(function () {
      var orig = el.style.background;
      el.style.background = 'rgba(34,197,94,0.15)';
      el.style.borderColor = 'rgba(34,197,94,0.4)';
      setTimeout(function() {
        el.style.background = '';
        el.style.borderColor = '';
      }, 1200);
    });
  };

  if (!checkoutId) {
    showError('No checkout session found. If you just paid, please check your email for your license key, or contact <a href="mailto:info@sentinelvision.net.za">info@sentinelvision.net.za</a> with your order details.');
    return;
  }

  fetch(BACKEND + '/verify-payment', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
    body: JSON.stringify({ checkoutId: checkoutId }),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      showSuccess(data);
    } else {
      showError((data.error || 'Payment confirmed but key not ready yet.') +
        ' Please check your email &mdash; your key may have already been sent. If not, contact <a href="mailto:info@sentinelvision.net.za">info@sentinelvision.net.za</a>.');
    }
  })
  .catch(function() {
    showError('Could not reach the license server. Your payment was received &mdash; please check your email for your license key, or contact <a href="mailto:info@sentinelvision.net.za">info@sentinelvision.net.za</a>.');
  });
})();
</script>

</body>
</html>
