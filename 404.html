  <style>
    .notfound-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .notfound-code {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #3b82f6 30%, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .notfound-icon {
      font-size: 3rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      display: block;
    }
    .notfound-wrap h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      margin-bottom: 0.75rem;
    }
    .notfound-wrap p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 440px;
      margin: 0 auto 2rem;
      line-height: 1.7;
    }
    .notfound-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
